<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenVault — Confidential Data Registry</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<style>
  /* ---------- responsive layout grids (referenced by page scripts) ---------- */
  .ov-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 1200px) { .ov-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 900px)  { .ov-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .ov-grid { grid-template-columns: 1fr; } }

  .ov-detail-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 920px) { .ov-detail-grid { grid-template-columns: 1fr; } }

  .ov-compute-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    align-items: start;
  }
  @media (max-width: 820px) { .ov-compute-grid { grid-template-columns: 1fr; } }

  .ov-lb-row {
    display: grid;
    grid-template-columns: 64px minmax(0,1fr) 110px 120px 100px 150px;
    gap: 14px;
    align-items: center;
    padding: 13px 20px;
  }
  @media (max-width: 720px) {
    .ov-lb-row { grid-template-columns: 52px minmax(0,1fr) 110px 80px; }
    .ov-lb-hide { display: none !important; }
  }

  @media (max-width: 560px) {
    .ov-nav { display: none !important; }
    .ov-network { display: none !important; }
  }
</style>
</head>
<body>
  <div id="ov-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="page_browse.jsx"></script>
  <script type="text/babel" src="page_artifact.jsx"></script>
  <script type="text/babel" src="page_upload.jsx"></script>
  <script type="text/babel" src="page_compute.jsx"></script>
  <script type="text/babel" src="page_misc.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
